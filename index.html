<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>казик ивотских</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f1123 0%, #1d1b3a 50%, #291a30 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-glow: rgba(255, 255, 255, 0.25);
            --accent-pink: #ff7597;
            --accent-purple: #b57bee;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Элементы Liquid Glass */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: absolute;
            opacity: 0;
            transform: scale(0.9) translateY(30px);
            pointer-events: none;
        }

        .glass-panel.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            position: relative;
        }

        /* Кнопки Liquid Glass */
        .btn-liquid {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-main);
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .btn-liquid::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: 0.6s;
        }

        .btn-liquid:hover::before {
            left: 100%;
        }

        .btn-liquid:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--glass-glow);
            box-shadow: 0 12px 28px rgba(181, 123, 238, 0.2);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
        }

        .btn-liquid:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-liquid:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-accent {
            background: linear-gradient(135deg, rgba(255, 117, 151, 0.2), rgba(181, 123, 238, 0.2));
            border: 1px solid rgba(255, 117, 151, 0.4);
        }
        .btn-accent:hover {
            box-shadow: 0 12px 28px rgba(255, 117, 151, 0.3);
            border-color: rgba(255, 117, 151, 0.6);
        }

        /* Инпуты */
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
        }

        .glass-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(181, 123, 238, 0.2);
        }

        /* Навигация сверху */
        .top-nav {
            position: fixed;
            top: 24px;
            left: 24px;
            right: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }
        .top-nav * { pointer-events: auto; }

        .nickname-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .nickname-input-top {
            background: transparent;
            border: none;
            color: var(--accent-pink);
            font-weight: 700;
            font-size: 16px;
            width: 120px;
            outline: none;
        }

        /* Главный Экран */
        .main-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Лобби */
        .room-code-box {
            background: rgba(0,0,0,0.15);
            padding: 16px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 1px dashed var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }
        .room-code-box:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--accent-pink);
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0;
            text-align: left;
        }
        .player-slot {
            background: rgba(255,255,255,0.03);
            padding: 14px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-role {
            font-size: 12px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 117, 151, 0.2);
            color: var(--accent-pink);
        }

        /* Экраны Игр */
        .game-layout {
            max-width: 900px !important;
            width: 95%;
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--accent-pink);
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.2);
        }

        .spin-center-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #d4af37 100%);
            border: 4px solid var(--bg-gradient);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 800;
            font-size: 12px;
            transition: all 0.1s;
        }
        .spin-center-btn:active {
            transform: translate(-50%, -50%) scale(0.92);
        }

        .wheel-config {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        /* Режим Казино */
        .casino-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .balance-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
        }
        .balance-card span { color: #4ade80; font-weight: 800; }

        .duel-arena {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin: 20px 0;
            gap: 20px;
        }

        .duel-player-box {
            flex: 1;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .duel-player-box.ready {
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.15);
        }

        .dice-view {
            font-size: 48px;
            margin-top: 15px;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Всплывающие уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 14px 28px;
            border-radius: 16px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            font-weight: 500;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .wheel-title-display {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-pink);
            min-height: 30px;
            text-shadow: 0 0 15px rgba(255, 117, 151, 0.3);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nickname-container">
            <span style="font-size: 13px; color: var(--text-muted)">Ник:</span>
            <input type="text" id="topNickInput" class="nickname-input-top" value="Игрок">
        </div>
        <button id="btnGoMenu" class="btn-liquid" style="display: none; padding: 8px 20px; border-radius: 50px;">В меню</button>
    </div>

    <div id="screenMain" class="glass-panel active">
        <h1 class="main-title">казик ивотских</h1>
        <div class="menu-buttons">
            <button onclick="createRoom()" class="btn-liquid btn-accent">Создать комнату</button>
            <button onclick="switchScreen('screenJoin')" class="btn-liquid">Подключиться</button>
        </div>
    </div>

    <div id="screenJoin" class="glass-panel">
        <h2 style="margin-bottom: 24px;">Подключение</h2>
        <input type="text" id="joinCodeInput" class="glass-input" placeholder="Введите код комнаты (XXXX_1234)" style="margin-bottom: 20px; text-transform: uppercase;">
        <div style="display: flex; gap: 12px;">
            <button onclick="switchScreen('screenMain')" class="btn-liquid" style="flex: 1;">Назад</button>
            <button onclick="joinRoom()" id="submitJoinBtn" class="btn-liquid btn-accent" style="flex: 1;">Войти</button>
        </div>
    </div>

    <div id="screenLobby" class="glass-panel">
        <h2>Ожидание игроков</h2>
        <div class="room-code-box" id="lobbyCodeDisplay" onclick="copyCode()">
            <span>КОД</span>
        </div>
        
        <div class="player-list" id="lobbyPlayerList">
            </div>

        <div id="hostControls" style="display: none; margin-top: 25px;">
            <p style="color: var(--text-muted); margin-bottom: 12px; font-size: 14px;">Выберите режим игры:</p>
            <div class="mode-selector" style="margin-bottom: 20px;">
                <button onclick="selectMode('wheel')" id="modeBtn-wheel" class="btn-liquid btn-accent" style="padding: 10px 20px;">Колесо Фортуны</button>
                <button onclick="selectMode('casino')" id="modeBtn-casino" class="btn-liquid" style="padding: 10px 20px;">Казино Дуэль</button>
            </div>
            <button onclick="startGame()" class="btn-liquid btn-accent" style="width: 100%;">Запустить игру для двоих</button>
        </div>
        <div id="guestControls" style="display: none; color: var(--text-muted); margin-top: 20px;">
            Ожидание, пока хост запустит игру...
        </div>
    </div>

    <div id="screenWheel" class="glass-panel game-layout">
        <div class="wheel-title-display" id="wheelTitleText">Колесо Фортуны</div>
        
        <div class="wheel-section">
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <div class="spin-center-btn" onclick="spinWheelClick()">КРУТИ</div>
                <canvas id="wheelCanvas" width="320" height="320"></canvas>
            </div>

            <div class="wheel-config" id="wheelInputsConfig">
                <input type="text" id="inputWheelTitle" class="glass-input" placeholder="Заголовок" value="Кто моет посуду?" oninput="updateWheelConfig()">
                <div></div>
                <input type="text" id="inputOpt1" class="glass-input" placeholder="Вариант 1" value="Ты" oninput="updateWheelConfig()">
                <input type="text" id="inputOpt2" class="glass-input" placeholder="Вариант 2" value="Не ты" oninput="updateWheelConfig()">
            </div>
        </div>
    </div>

    <div id="screenCasino" class="glass-panel game-layout">
        <h2 style="margin-bottom: 10px;">Казино Дуэль</h2>
        <div class="balance-card">Баланс: <span id="balanceDisplay">1000</span> $</div>

        <div class="duel-arena">
            <div class="duel-player-box" id="casinoHostBox">
                <div id="casinoHostName" style="font-weight: 700;">Хост</div>
                <div style="font-size: 13px; color: var(--text-muted); margin-top: 5px;" id="casinoHostBetState">Ставка: 0</div>
                <div class="dice-view" id="casinoHostDice">🎲</div>
            </div>
            <div class="duel-player-box" id="casinoGuestBox">
                <div id="casinoGuestName" style="font-weight: 700;">Ожидание...</div>
                <div style="font-size: 13px; color: var(--text-muted); margin-top: 5px;" id="casinoGuestBetState">Ставка: 0</div>
                <div class="dice-view" id="casinoGuestDice">🎲</div>
            </div>
        </div>

        <div style="max-width: 300px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;">
            <input type="number" id="betInput" class="glass-input" placeholder="Размер ставки" value="100">
            <button onclick="placeCasinoBet()" id="casinoActionBtn" class="btn-liquid btn-accent">Подтвердить ставку</button>
        </div>
    </div>

    <div id="toast" class="toast">Уведомление</div>

    <script>
        const network = new BroadcastChannel('kazik_ivotskih_channel');
        
        let myId = 'ID_' + Math.floor(Math.random() * 100000);
        let myNick = localStorage.getItem('kazik_nick') || 'Игрок_' + Math.floor(Math.random() * 100);
        let myBalance = 1000;
        let isConnecting = false;
        
        let room = {
            code: null,
            hostId: null,
            hostNick: '',
            guestId: null,
            guestNick: '',
            state: 'menu', 
            selectedMode: 'wheel',
            wheelTitle: 'Кто моет посуду?',
            opt1: 'Ты',
            opt2: 'Не ты',
            hostBet: 0,
            guestBet: 0,
            hostReady: false,
            guestReady: false
        };

        let wheelAngle = 0;
        let wheelVelocity = 0;
        const friction = 0.985;
        let isSpinning = false;

        document.getElementById('topNickInput').value = myNick;
        document.getElementById('topNickInput').addEventListener('input', (e) => {
            myNick = e.target.value;
            localStorage.setItem('kazik_nick', myNick);
            if(room.code) {
                if(myId === room.hostId) room.hostNick = myNick;
                else room.guestNick = myNick;
                syncRoom();
            }
        });

        document.getElementById('btnGoMenu').addEventListener('click', () => {
            leaveRoom();
        });

        network.onmessage = (event) => {
            const msg = event.data;
            
            // Хост получает запрос от гостя
            if (msg.type === 'JOIN_REQ' && room.code && msg.code === room.code && myId === room.hostId) {
                if (!room.guestId) {
                    room.guestId = msg.senderId;
                    room.guestNick = msg.senderNick;
                    showToast(`${msg.senderNick} подключился!`);
                    syncRoom();
                }
            }
            
            // Синхронизация состояния для обоих игроков
            if (msg.type === 'SYNC' && room.code && msg.code === room.code) {
                if (myId !== msg.senderId) {
                    const oldState = room.state;
                    
                    // Если гость успешно поймал пакет от хоста — отменяем статус загрузки
                    if (isConnecting && msg.roomState.hostId) {
                        isConnecting = false;
                        const btn = document.getElementById('submitJoinBtn');
                        btn.innerText = "Войти";
                        btn.disabled = false;
                    }

                    room = msg.roomState;
                    updateUI();
                    
                    if(oldState !== room.state || document.getElementById('screenJoin').classList.contains('active')) {
                        applyScreenChange(room.state);
                    }
                }
            }

            if (msg.type === 'SPIN_IMPULSE' && room.code && msg.code === room.code) {
                wheelVelocity += 14;
                if(!isSpinning) processWheelPhysics();
            }

            if (msg.type === 'LEAVE' && room.code && msg.code === room.code) {
                showToast("Второй игрок вышел");
                if (myId !== room.hostId) {
                    leaveRoom();
                } else {
                    room.guestId = null;
                    room.guestNick = '';
                    room.state = 'lobby';
                    applyScreenChange('lobby');
                    syncRoom();
                }
            }
        };

        function syncRoom() {
            if (!room.code) return;
            network.postMessage({
                type: 'SYNC',
                code: room.code,
                senderId: myId,
                roomState: room
            });
            updateUI();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.glass-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'screenMain' || screenId === 'screenJoin') {
                document.getElementById('btnGoMenu').style.display = 'none';
            } else {
                document.getElementById('btnGoMenu').style.display = 'block';
            }
        }

        function applyScreenChange(state) {
            if(state === 'lobby') switchScreen('screenLobby');
            if(state === 'wheel') {
                switchScreen('screenWheel');
                initWheel();
            }
            if(state === 'casino') {
                switchScreen('screenCasino');
                resetCasinoUi();
            }
        }

        function createRoom() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let randLetters = "";
            for (let i = 0; i < 4; i++) randLetters += letters.charAt(Math.floor(Math.random() * letters.length));
            let randNumbers = Math.floor(1000 + Math.random() * 9000);
            
            room.code = `${randLetters}_${randNumbers}`;
            room.hostId = myId;
            room.hostNick = myNick;
            room.guestId = null;
            room.guestNick = '';
            room.state = 'lobby';
            room.selectedMode = 'wheel';

            applyScreenChange('lobby');
            syncRoom();
            showToast("Комната создана!");
        }

        function joinRoom() {
            const input = document.getElementById('joinCodeInput').value.trim().toUpperCase();
            if(!input) return showToast("Введите код!");
            
            room.code = input;
            isConnecting = true;
            
            const btn = document.getElementById('submitJoinBtn');
            btn.innerText = "Вход...";
            btn.disabled = true;

            // Отправляем частые сигналы, чтобы пробить энергосбережение браузера у хоста
            let attempts = 0;
            const interval = setInterval(() => {
                if (!isConnecting) {
                    clearInterval(interval);
                    return;
                }
                
                network.postMessage({
                    type: 'JOIN_REQ',
                    code: input,
                    senderId: myId,
                    senderNick: myNick
                });

                attempts++;
                if (attempts >= 6) { // 3 секунды ожидания общего времени
                    clearInterval(interval);
                    if (isConnecting) {
                        showToast("Комната не найдена или хост оффлайн");
                        room.code = null;
                        isConnecting = false;
                        btn.innerText = "Войти";
                        btn.disabled = false;
                    }
                }
            }, 500);
        }

        function leaveRoom() {
            network.postMessage({ type: 'LEAVE', code: room.code });
            room = { code: null, hostId: null, guestId: null, state: 'menu' };
            switchScreen('screenMain');
        }

        function updateUI() {
            if (!room.code) return;

            document.getElementById('lobbyCodeDisplay').innerHTML = `<span>${room.code}</span> <span style="font-size:12px;color:var(--text-muted); font-weight:normal; margin-left:10px;">(нажми чтобы скопировать)</span>`;
            
            const isHost = (myId === room.hostId);
            document.getElementById('hostControls').style.display = (isHost && room.guestId) ? 'block' : 'none';
            document.getElementById('guestControls').style.display = (!isHost) ? 'block' : 'none';

            const list = document.getElementById('lobbyPlayerList');
            list.innerHTML = `
                <div class="player-slot">
                    <span>👑 ${room.hostNick}</span>
                    <span class="player-role">Хост</span>
                </div>
            `;
            if (room.guestId) {
                list.innerHTML += `
                    <div class="player-slot">
                        <span>👤 ${room.guestNick}</span>
                        <span class="player-role" style="background:rgba(181,123,238,0.2);color:var(--accent-purple);">Игрок</span>
                    </div>
                `;
            } else {
                list.innerHTML += `
                    <div class="player-slot" style="border-style:dashed;justify-content:center;color:var(--text-muted)">
                        <span>Ожидание второго игрока...</span>
                    </div>
                `;
            }

            if(isHost) {
                document.getElementById(`modeBtn-wheel`).className = room.selectedMode === 'wheel' ? 'btn-liquid btn-accent' : 'btn-liquid';
                document.getElementById(`modeBtn-casino`).className = room.selectedMode === 'casino' ? 'btn-liquid btn-accent' : 'btn-liquid';
            }

            document.getElementById('wheelTitleText').innerText = room.wheelTitle;
            if(!isHost) {
                document.getElementById('wheelInputsConfig').style.display = 'none';
            } else {
                document.getElementById('wheelInputsConfig').style.display = 'grid';
            }

            document.getElementById('balanceDisplay').innerText = myBalance;
            document.getElementById('casinoHostName').innerText = room.hostNick || "Хост";
            document.getElementById('casinoGuestName').innerText = room.guestNick || "Ожидание...";
            document.getElementById('casinoHostBetState').innerText = `Ставка: ${room.hostBet} $ ${room.hostReady ? '✅' : ''}`;
            document.getElementById('casinoGuestBetState').innerText = `Ставка: ${room.guestBet} $ ${room.guestReady ? '✅' : ''}`;
        }

        function copyCode() {
            if(!room.code) return;
            navigator.clipboard.writeText(room.code);
            showToast("Код скопирован в буфер!");
        }

        function selectMode(mode) {
            room.selectedMode = mode;
            syncRoom();
        }

        function startGame() {
            if(!room.guestId) return showToast("Нужен второй игрок!");
            room.state = room.selectedMode;
            syncRoom();
            applyScreenChange(room.state);
        }

        /* --- МОДУЛЬ: КОЛЕСО ФОРТУНЫ --- */
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function updateWheelConfig() {
            room.wheelTitle = document.getElementById('inputWheelTitle').value;
            room.opt1 = document.getElementById('inputOpt1').value || 'Вариант 1';
            room.opt2 = document.getElementById('inputOpt2').value || 'Вариант 2';
            syncRoom();
            initWheel();
        }

        function initWheel() {
            drawWheel(0);
        }

        function drawWheel(currentAngle) {
            const colors = ['#ff7597', '#b57bee'];
            const labels = [room.opt1, room.opt2];
            const center = 160;
            
            ctx.clearRect(0, 0, 320, 320);
            
            for (let i = 0; i < 2; i++) {
                const angleStart = currentAngle + (i * Math.PI);
                const angleEnd = currentAngle + ((i + 1) * Math.PI);
                
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, 150, angleStart, angleEnd);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.stroke();
                
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angleStart + Math.PI / 2);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], 0, -80);
                ctx.restore();
            }
        }

        function spinWheelClick() {
            network.postMessage({ type: 'SPIN_IMPULSE', code: room.code });
            wheelVelocity += 14; 
            if (!isSpinning) {
                processWheelPhysics();
            }
        }

        function processWheelPhysics() {
            isSpinning = true;
            function animate() {
                if (wheelVelocity > 0.05) {
                    wheelVelocity *= friction; 
                    wheelAngle += wheelVelocity * 0.05;
                    drawWheel(wheelAngle);
                    requestAnimationFrame(animate);
                } else {
                    wheelVelocity = 0;
                    isSpinning = false;
                    determineWheelWinner();
                }
            }
            animate();
        }

        function determineWheelWinner() {
            const normalizedAngle = (wheelAngle + Math.PI * 1.5) % (Math.PI * 2);
            const winner = normalizedAngle < Math.PI ? room.opt2 : room.opt1;
            showToast(`Результат: ${winner}`);
        }

        /* --- МОДУЛЬ: КАЗИНО ДУЭЛЬ --- */
        function resetCasinoUi() {
            document.getElementById('casinoHostDice').innerText = '🎲';
            document.getElementById('casinoGuestDice').innerText = '🎲';
            document.getElementById('casinoActionBtn').innerText = "Подтвердить ставку";
            document.getElementById('casinoActionBtn').disabled = false;
            room.hostReady = false;
            room.guestReady = false;
            room.hostBet = 0;
            room.guestBet = 0;
            updateUI();
        }

        function placeCasinoBet() {
            const betValue = parseInt(document.getElementById('betInput').value);
            if (isNaN(betValue) || betValue <= 0 || betValue > myBalance) {
                return showToast("Некорректная сумма ставки!");
            }

            myBalance -= betValue;
            
            if (myId === room.hostId) {
                room.hostBet = betValue;
                room.hostReady = true;
            } else {
                room.guestBet = betValue;
                room.guestReady = true;
            }

            document.getElementById('casinoActionBtn').innerText = "Готов к дуэли...";
            document.getElementById('casinoActionBtn').disabled = true;

            syncRoom();

            if (room.hostReady && room.guestReady) {
                executeCasinoRoll();
            }
        }

        function executeCasinoRoll() {
            let ticks = 0;
            const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            
            let hostResult = Math.floor(Math.random() * 6) + 1;
            let guestResult = Math.floor(Math.random() * 6) + 1;
            
            if(myId === room.hostId) {
                room.finalHostRoll = hostResult;
                room.finalGuestRoll = guestResult;
                syncRoom();
            }

            const interval = setInterval(() => {
                document.getElementById('casinoHostDice').innerText = diceIcons[Math.floor(Math.random() * 6)];
                document.getElementById('casinoGuestDice').innerText = diceIcons[Math.floor(Math.random() * 6)];
                document.getElementById('casinoHostDice').style.transform = `rotate(${ticks * 45}deg)`;
                document.getElementById('casinoGuestDice').style.transform = `rotate(-${ticks * 45}deg)`;
                
                ticks++;
                if (ticks > 12) {
                    clearInterval(interval);
                    
                    const resH = room.finalHostRoll || hostResult;
                    const resG = room.finalGuestRoll || guestResult;
                    
                    document.getElementById('casinoHostDice').innerText = diceIcons[resH - 1];
                    document.getElementById('casinoGuestDice').innerText = diceIcons[resG - 1];
                    document.getElementById('casinoHostDice').style.transform = 'none';
                    document.getElementById('casinoGuestDice').style.transform = 'none';

                    resolveCasinoBattle(resH, resG);
                }
            }, 100);
        }

        function resolveCasinoBattle(hostScore, guestScore) {
            const isHost = (myId === room.hostId);
            const totalPool = room.hostBet + room.guestBet;

            if (hostScore === guestScore) {
                showToast("Ничья! Ставки возвращены.");
                myBalance += isHost ? room.hostBet : room.guestBet;
            } else if (hostScore > guestScore) {
                if (isHost) {
                    showToast(`Вы выиграли ${totalPool} $!`);
                    myBalance += totalPool;
                } else {
                    showToast("Хост выиграл дуэль!");
                }
            } else {
                if (!isHost) {
                    showToast(`Вы выиграли ${totalPool} $!`);
                    myBalance += totalPool;
                } else {
                    showToast("Гость выиграл дуэль!");
                }
            }

            setTimeout(() => {
                if(myId === room.hostId) {
                    resetCasinoUi();
                    syncRoom();
                }
            }, 4000);
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
